name: Build and Test

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gobuss-back
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gobuss-front
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './gobuss-front/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Run ESLint
      run: npm run lint || true
    - name: Run Tests
      run: npm run test
    - name: Build
      run: npm run build
