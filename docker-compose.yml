version: '3.8'

services:
  db:
    image: postgres:16
    container_name: gobuss_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gobuss}
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-gobuss}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./gobuss-back
    container_name: gobuss_backend
    ports:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-gobuss}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-root}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-password}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  frontend:
    build:
      context: ./gobuss-front
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: gobuss_frontend
    ports:
      - "80"
    depends_on:
      - backend

volumes:
  postgres_data:
