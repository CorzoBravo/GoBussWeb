server {
    listen 80;
    server_name localhost;

    # Resolver de DNS interno de Docker (necesario para resolución dinámica de hosts en variables)
    resolver 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # Usamos una variable para evitar que Nginx falle al iniciar si el backend está caído o iniciándose
        set $backend_service "http://gobuss-back:8080";
        proxy_pass $backend_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
